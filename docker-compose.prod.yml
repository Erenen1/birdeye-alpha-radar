services:
  redis:
    image: redis:alpine
    container_name: birdeye_redis
    restart: unless-stopped

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: birdeye_ml_service
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: birdeye_frontend
    expose:
      - "3000"
    environment:
      - ML_SERVICE_URL=http://ml_service:8000
    env_file:
      - .env
    depends_on:
      - ml_service
      - redis
    restart: unless-stopped
